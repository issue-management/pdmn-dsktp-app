apiVersion: v1
kind: Secret
metadata:
  name: podman-desktop-bot-secrets
  labels:
    app: podman-desktop-bot
type: Opaque
stringData:
  GITHUB_APP_ID: "your-app-id"
  GITHUB_PRIVATE_KEY: |
    -----BEGIN RSA PRIVATE KEY-----
    ...your private key here...
    -----END RSA PRIVATE KEY-----
  GITHUB_WEBHOOK_SECRET: "your-webhook-secret"
