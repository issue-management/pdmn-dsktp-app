name: pr-check

permissions:
  contents: read

on: [pull_request]

jobs:
  build:
    name: Build / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: "windows-2025"
          - os: "macos-26"
          - os: "ubuntu-24.04"
    timeout-minutes: 20
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@078e9d416474b29c0c387560859308974f7e9c53 # v4
        name: Install pnpm
        with:
          run_install: false

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Execute pnpm
        run: pnpm install --frozen-lockfile

      - name: Write configuration files
        shell: bash
        run: |
          cat > domains.json << 'EOF'
          [
            {
              "domain": "Sample",
              "description": "sample domain",
              "owners": ["John"]
            }
          ]
          EOF
          cat > users.json << 'EOF'
          {
            "John": "issue-management"
          }
          EOF
          # Format these 2 files to avoid formatting issues
          ./node_modules/.bin/biome format --fix users.json
          ./node_modules/.bin/biome format --fix domains.json

      - name: Run typecheck
        run: pnpm typecheck

      # skip formatter on windows
      - name: Run formatter
        if: ${{ matrix.os=='ubuntu-24.04' || matrix.os=='macos-26' }}
        run: pnpm format:check

      - name: Run linter
        run: pnpm lint:check

      - name: Run tests
        run: pnpm test

      - name: Run build
        run: pnpm build

  image-build:
    name: Image Build
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    needs: build
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Write configuration files
        run: |
          cat > domains.json << 'EOF'
          [
            {
              "domain": "Sample",
              "description": "sample domain",
              "owners": ["John"]
            }
          ]
          EOF
          cat > users.json << 'EOF'
          {
            "John": "issue-management"
          }
          EOF

      - name: Build image
        uses: redhat-actions/buildah-build@7a95fa7ee0f02d552a32753e7414641a04307056 # v2
        with:
          image: ${{ github.repository }}
          tags: ${{ github.sha }}
          containerfiles: |
            Dockerfile
          context: .
          oci: true
