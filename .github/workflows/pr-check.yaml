name: pr-check

permissions:
  contents: read

on: [pull_request]

jobs:
  build:
    name: Build / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: "windows-2022"
          - os: "macos-14"
          - os: "ubuntu-24.04"
    timeout-minutes: 20
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4
        name: Install pnpm
        with:
          run_install: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Execute pnpm
        run: pnpm install --frozen-lockfile

      - name: Write configuration files
        run: |
          echo '${{ vars.DOMAINS_JSON }}' > domains.json
          echo '${{ vars.USERS_JSON }}' > users.json

      - name: Run typecheck
        run: pnpm typecheck

      # skip formatter on windows
      - name: Run formatter
        if: ${{ matrix.os=='ubuntu-24.04' || matrix.os=='macos-14' }}
        run: pnpm format:check

      - name: Run linter
        run: pnpm lint:check

      - name: Run tests
        run: pnpm test

      - name: Run build
        run: pnpm build

  image-build:
    name: Image Build
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    needs: build
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Write configuration files
        run: |
          echo '${{ vars.DOMAINS_JSON }}' > domains.json
          echo '${{ vars.USERS_JSON }}' > users.json

      - name: Build image
        uses: redhat-actions/buildah-build@7a95fa7ee0f02d552a32753e7414641a04307056 # v2
        with:
          image: ${{ github.repository }}
          tags: ${{ github.sha }}
          containerfiles: |
            Dockerfile
          context: .
          oci: true
